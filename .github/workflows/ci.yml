name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Run Linter
        working-directory: ./client
        run: npm run lint

      - name: Run Unit Tests
        working-directory: ./client
        run: npm run test

      - name: Enforce Unit Coverage Thresholds
        working-directory: ./client
        run: npm run test:coverage

      - name: Run Production Build
        working-directory: ./client
        run: npm run build

      - name: Type Check Edge Functions
        run: |
          deno check --frozen \
            supabase/functions/complete-session/index.ts \
            supabase/functions/create-session/index.ts \
            supabase/functions/start-session/index.ts \
            supabase/functions/get-stimuli/index.ts \
            supabase/functions/submit-results/index.ts \
            supabase/functions/save-drawing/index.ts \
            supabase/functions/save-audio/index.ts \
            supabase/functions/get-session/index.ts \
            supabase/functions/update-drawing-review/index.ts \
            supabase/functions/update-scoring-review/index.ts \
            supabase/functions/export-pdf/index.ts \
            supabase/functions/export-csv/index.ts
