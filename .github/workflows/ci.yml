name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Run Linter
        working-directory: ./client
        run: npm run lint

      - name: Run Unit Tests
        working-directory: ./client
        run: npm run test

      - name: Enforce Unit Coverage Thresholds
        working-directory: ./client
        run: npm run test:coverage

      - name: Run Production Build
        working-directory: ./client
        run: npm run build

      - name: Type Check Edge Functions
        run: |
          deno check --frozen \
            supabase/functions/complete-session/index.ts \
            supabase/functions/create-session/index.ts \
            supabase/functions/start-session/index.ts \
            supabase/functions/get-stimuli/index.ts \
            supabase/functions/submit-results/index.ts \
            supabase/functions/save-drawing/index.ts \
            supabase/functions/save-audio/index.ts \
            supabase/functions/get-session/index.ts \
            supabase/functions/update-drawing-review/index.ts \
            supabase/functions/update-scoring-review/index.ts \
            supabase/functions/export-pdf/index.ts \
            supabase/functions/export-csv/index.ts

      - name: Run Edge Function Unit Tests
        run: |
          deno test --allow-env --allow-net --allow-read=client/src/lib/scoring/__fixtures__ \
            supabase/functions/_shared/*_test.ts \
            supabase/functions/start-session/index_test.ts

  full-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.4

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: ./client
        run: npx playwright install --with-deps chrome

      - name: Start local Supabase
        run: supabase start -x vector,logflare

      - name: Configure client local env
        shell: bash
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"
          {
            echo "VITE_SUPABASE_URL=${API_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}"
          } > client/.env.local
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
          } >> "$GITHUB_ENV"

      - name: Serve Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          supabase functions serve create-session start-session get-stimuli submit-results save-drawing save-audio complete-session get-session update-drawing-review update-scoring-review export-pdf export-csv --env-file /dev/null > /tmp/supabase-functions.log 2>&1 &
          echo "$!" > /tmp/supabase-functions.pid
          for _ in {1..30}; do
            if grep -q "Serving functions on" /tmp/supabase-functions.log && curl -sS -o /dev/null http://127.0.0.1:54321/functions/v1/start-session; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/supabase-functions.log
          exit 1

      - name: Run scripted Supabase E2E
        run: node scripts/local-e2e.mjs --all-versions --skip-licensed-pdf-check

      - name: Run Playwright browser E2E
        working-directory: ./client
        run: npm run e2e:browser

      - name: Upload Supabase function logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-functions-log
          path: /tmp/supabase-functions.log
          if-no-files-found: ignore
