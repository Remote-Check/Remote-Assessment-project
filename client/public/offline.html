<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="icon" href="/patient-icon.svg" />
    <title>אין חיבור לאינטרנט</title>
    <style>
      :root {
        color: #111827;
        background: #f9fafb;
        font-family: Heebo, Assistant, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        background: #ffffff;
        padding: 32px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: clamp(18px, 4vw, 24px);
        line-height: 1.5;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>אין חיבור לאינטרנט</h1>
      <p>כדי להתחיל או להמשיך את המבדק יש להתחבר לאינטרנט. אם הבעיה נמשכת, פנה לקלינאי.</p>
    </main>
  </body>
</html>
